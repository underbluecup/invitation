<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>게스트 갤러리 · 한현규 ﹒ 권정현 결혼합니다</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>
  :root{
    --blue:         #519769;
    --terracotta:   #9D75E6;
    --sage:         #38FF92;
    --cream:        #FFFDE8;
    --white:        #FFFFFF;
    --ink:          #1B1B1B;
    --ink-soft:     #514f45;
    --line:         rgba(27,27,27,0.14);
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html{ scroll-behavior:smooth; }
  body{
    margin:0;
    background:var(--blue);
    color:var(--ink);
    font-family:'Noto Sans KR', sans-serif;
    font-weight:400;
    display:flex;
    justify-content:center;
  }
  @media (prefers-reduced-motion:reduce){ *{ animation:none !important; transition:none !important; } }

  .frame{
    width:100%;
    max-width:480px;
    background:var(--white);
    min-height:100vh;
    position:relative;
    box-shadow:0 0 60px rgba(0,0,0,0.35);
  }

  .section{ padding:58px 26px; position:relative; }

  .back-link{
    display:flex; align-items:center; gap:4px; font-size:13px; font-weight:700;
    color:var(--ink-soft); text-decoration:none; margin-bottom:18px;
  }

  .eyebrow{
    font-family:'Noto Sans KR', sans-serif; font-weight:700; font-size:13px; letter-spacing:.04em;
    color:var(--terracotta); display:inline-flex; align-items:center; gap:8px;
  }
  h2.section-title{
    font-family:'Noto Sans KR', sans-serif; font-weight:900; font-size:24px; margin:8px 0 4px;
    color:var(--ink); line-height:1.35;
  }
  .rsvp-note{ margin-top:10px; margin-bottom:24px; font-size:14.5px; font-weight:500; color:var(--ink-soft); line-height:1.7; }

  .gallery-grid{
    display:grid; grid-template-columns:repeat(3,1fr); gap:8px;
  }
  .gallery-thumb{
    position:relative; aspect-ratio:1/1; border-radius:10px; overflow:hidden;
    border:2px solid var(--ink); background:var(--ink); cursor:pointer; padding:0;
  }
  .gallery-thumb img, .gallery-thumb video{ width:100%; height:100%; object-fit:cover; display:block; }
  .gallery-thumb .thumb-play{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:18px; color:#fff; background:rgba(0,0,0,.25); pointer-events:none;
  }

  .state-msg{
    text-align:center; padding:40px 10px; font-size:14px; font-weight:500; color:var(--ink-soft); line-height:1.7;
  }

  .lightbox{
    display:none; position:fixed; inset:0; background:rgba(0,0,0,.9); z-index:100;
    align-items:center; justify-content:center; padding:20px; flex-direction:column; gap:14px;
  }
  .lightbox.show{ display:flex; }
  .lightbox img, .lightbox video{ max-width:100%; max-height:75vh; border-radius:10px; }
  .lightbox-close{
    position:absolute; top:18px; right:18px; width:38px; height:38px; border-radius:50%;
    background:var(--white); border:2px solid var(--ink); color:var(--ink); font-size:18px; font-weight:700;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .lightbox-caption{ color:#fff; font-size:13px; font-weight:500; text-align:center; }
  .lightbox-download{
    color:#fff; font-size:13px; font-weight:700; text-decoration:underline;
  }
</style>
</head>
<body>
<div class="frame">

  <section class="section">
    <a class="back-link" href="index.html">‹ 청첩장으로</a>

    <span class="eyebrow">📷 Guest Gallery</span>
    <h2 class="section-title">게스트 갤러리</h2>
    <p class="rsvp-note">하객분들이 올려주신 사진과 동영상이에요. 감사한 마음으로 잘 보고 있습니다 🤍</p>

    <div id="galleryState" class="state-msg">불러오는 중...</div>
    <div class="gallery-grid" id="galleryGrid"></div>
  </section>

</div>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">✕</button>
  <div id="lightboxMedia"></div>
  <div class="lightbox-caption" id="lightboxCaption"></div>
  <a class="lightbox-download" id="lightboxDownload" target="_blank" rel="noopener">원본 보기</a>
</div>

<script>
  var PRESIGN_ENDPOINT = "https://guest-snap-presign.junghyun611.workers.dev";
  var VIDEO_EXT = /\.(mp4|mov|webm|m4v|avi)$/i;
  var THUMB_SUFFIX = '.thumb.jpg';

  function displayName(key){
    // key format: "<timestamp>-<8char-uuid>-<original-filename>"
    return key.replace(/^\d+-[0-9a-f]{8}-/i, '');
  }

  function isVideo(key){
    return VIDEO_EXT.test(key);
  }

  function isThumb(key){
    return key.indexOf(THUMB_SUFFIX, key.length - THUMB_SUFFIX.length) !== -1;
  }

  function keyToUrl(publicBase, key){
    return publicBase.replace(/\/$/, '') + '/' + key.split('/').map(encodeURIComponent).join('/');
  }

  function openLightbox(url, key){
    var media = document.getElementById('lightboxMedia');
    media.innerHTML = '';
    var el;
    if(isVideo(key)){
      el = document.createElement('video');
      el.src = url;
      el.controls = true;
      el.autoplay = true;
      el.playsInline = true;
    } else {
      el = document.createElement('img');
      el.src = url;
    }
    media.appendChild(el);
    document.getElementById('lightboxCaption').textContent = displayName(key);
    document.getElementById('lightboxDownload').href = url;
    document.getElementById('lightbox').classList.add('show');
  }

  function closeLightbox(){
    document.getElementById('lightbox').classList.remove('show');
    document.getElementById('lightboxMedia').innerHTML = '';
  }

  document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
  document.getElementById('lightbox').addEventListener('click', function(e){
    if(e.target.id === 'lightbox'){ closeLightbox(); }
  });

  fetch(PRESIGN_ENDPOINT, { method: 'GET' })
    .then(function(res){
      if(!res.ok){ throw new Error('list failed'); }
      return res.json();
    })
    .then(function(data){
      var stateEl = document.getElementById('galleryState');
      var grid = document.getElementById('galleryGrid');
      var items = data.items || [];
      var publicBase = data.publicBase;

      if(!items.length){
        stateEl.textContent = '아직 업로드된 사진이 없어요.';
        return;
      }
      if(!publicBase){
        stateEl.textContent = '갤러리 설정이 아직 완료되지 않았어요.';
        return;
      }

      var thumbKeys = {};
      items.forEach(function(item){
        if(isThumb(item.key)){ thumbKeys[item.key] = true; }
      });

      var photoItems = items.filter(function(item){ return !isThumb(item.key); });

      if(!photoItems.length){
        stateEl.textContent = '아직 업로드된 사진이 없어요.';
        return;
      }

      stateEl.style.display = 'none';

      photoItems.forEach(function(item){
        var url = keyToUrl(publicBase, item.key);
        var thumbKey = item.key + THUMB_SUFFIX;
        // 미리 생성된 작은 썸네일이 있으면 그걸 쓰고, 없으면(예전 업로드) 원본으로 대체합니다.
        var thumbUrl = thumbKeys[thumbKey] ? keyToUrl(publicBase, thumbKey) : url;

        var thumb = document.createElement('button');
        thumb.className = 'gallery-thumb';
        thumb.type = 'button';

        var media = document.createElement('img');
        media.src = thumbUrl;
        media.loading = 'lazy';
        thumb.appendChild(media);

        if(isVideo(item.key)){
          var play = document.createElement('span');
          play.className = 'thumb-play';
          play.textContent = '▶';
          thumb.appendChild(play);
        }

        thumb.addEventListener('click', function(){ openLightbox(url, item.key); });
        grid.appendChild(thumb);
      });
    })
    .catch(function(){
      document.getElementById('galleryState').textContent = '갤러리를 불러오지 못했어요. 잠시 후 다시 시도해주세요.';
    });
</script>
</body>
</html>
